<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>

    <link rel="stylesheet" href="../../styles/tokens.css">
    <link rel="stylesheet" href="../../styles/typography.css">
    <link rel="stylesheet" href="../../styles/components.css">
    <link rel="stylesheet" href="../../components/navbar/style.css">
</head>
<body>
    <div id="navbar"></div>

    <div class="profile-title">
        <h1 class="text-xl-title1">Profile.</h1>
    </div>
    <div class="profile-content">

        <div class="profile-info">
            <div class="profile-card">
                <!-- Avatar -->
                <div class="profile-avatar">
                    <img src="../../assets/images/avatar.png" alt="Profile Picture">
                </div>

                <!-- Detail -->
                <div class="profile-detail">
                    <h2 class="text-large-title">John Doe</h2>

                    <div class="profile-meta">
                        <div class="profile-meta-item">
                            <img src="/assets/images/mail.png" alt="email">
                            <span class="text-subhead">JohnDoe@gmail.com</span>
                        </div>
                        <div class="profile-meta-item">
                            <img src="/assets/images/phone.png" alt="phone">
                            <span class="text-subhead">+62 812-4925-1237</span>
                        </div>
                        <div class="profile-meta-item">
                            <img src="/assets/images/job.png" alt="job">
                            <span class="text-subhead">UI/UX Designer</span>
                        </div>
                    </div>
                </div>

            </div>
        </div>

        <hr class="divider">

        <div class="history-content">

        </div>

    </div>
    <script src="../../js/utils.js"></script>
    <script>
        window.componentDepth = '../../';
    </script>
    <script src="../../js/components.js"></script>
    <script src="profile.js"></script>
</body>
</html>
