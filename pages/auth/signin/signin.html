<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CekTipu – Sign In</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <a href="../../index.html" class="back-btn">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    Back.
  </a>

  <div class="card">

    <div class="card-icon">
      <svg viewBox="0 0 24 24">
        <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
        <polyline points="10 17 15 12 10 7"/>
        <line x1="15" y1="12" x2="3" y2="12"/>
      </svg>
    </div>

    <h1>Sign In</h1>
    <p class="subtitle">Sign In into your account <span>CekTipu</span></p>

    <div class="form-group">
      <label>Email or Phone number <span class="req">*</span></label>
      <div class="input-wrap">
        <input type="text" id="emailInput" placeholder="Enter your email or your phone number" />
      </div>
      <span class="error-msg" id="emailError">Email atau nomor telepon tidak boleh kosong.</span>
    </div>

    <div class="form-group">
      <label>Password <span class="req">*</span></label>
      <div class="input-wrap">
        <input type="password" id="passwordInput" placeholder="Enter your password" />
        <button class="toggle-pw" type="button" onclick="togglePw('passwordInput', this)" aria-label="Tampilkan password">
          <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <span class="error-msg" id="passwordError">Password tidak boleh kosong.</span>
    </div>

    <a href="#" class="forgot">Forget Password?</a>

    <button class="btn-primary" onclick="handleSignIn()">Sign In</button>

    <div class="divider">or</div>

    <button class="btn-google" onclick="handleGoogle()">
      <svg class="google-icon" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.29-8.16 2.29-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        <path fill="none" d="M0 0h48v48H0z"/>
      </svg>
      Sign In with Google
    </button>

    <p class="bottom-link">Don't have an account? <a href="../signup/signup.html">Sign Up Here</a></p>

  </div>

  <script src="signin.js"></script>
</body>
</html>
